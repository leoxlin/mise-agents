[tools]
actionlint = "latest"
hk = "latest"
lua = "5.4"
lua-language-server = "latest"
node = "24"
pkl = "latest"
stylua = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ tests/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"

[tasks.ci]
description = "Run all CI checks"
depends = ["lint", "test"]
